<!-- Add Event Button -->
<button class="btn btn-primary" id="addEventButton" (click)="openModal()">
  Add Wrestling Event
</button>

<!-- Modal -->
<div class="modal fade" id="eventModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add Wrestling Event</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="eventForm" (ngSubmit)="submitEvent()">

          <div class="mb-3">
            <label class="form-label">Event Name</label>
            <input type="text" class="form-control" formControlName="name">
          </div>

          <!--<div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" formControlName="date">
          </div>

          <div class="mb-3">
            <label class="form-label">Organization</label>
            <input type="text" class="form-control" formControlName="organization">
          </div>-->

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" (click)="closeModal()">
              Cancel
            </button>
            <button type="submit" class="btn btn-success">
              Save Event
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
