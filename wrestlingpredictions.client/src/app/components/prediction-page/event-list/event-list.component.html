<app-add-event-modal *ngIf="authService.hasRole('Admin')" (eventCreated)="loadEvents()"></app-add-event-modal>

<div class="event-list">
  <div *ngFor="let event of events; trackBy: trackByEventId"
       class="event-item"
       [class.active]="event.id === selectedEventId"
       (click)="selectEvent(event)">
    <button class="delete-btn"
            (click)="deleteEvent(event.id); $event.stopPropagation()"
            *ngIf="authService.hasRole('Admin')">
      ✕
    </button>

    <h4>{{ event.name }}</h4>
  </div>
</div>
